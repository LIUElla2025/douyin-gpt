<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Neo-brutalist card background -->
  <rect x="2" y="2" width="56" height="56" rx="14" fill="#FFFFFF" stroke="#151617" stroke-width="3"/>
  <!-- Hard shadow -->
  <rect x="6" y="6" width="56" height="56" rx="14" fill="#151617"/>
  <rect x="2" y="2" width="56" height="56" rx="14" fill="#FFFFFF" stroke="#151617" stroke-width="3"/>
  <!-- "稿" character stylized as document icon -->
  <rect x="16" y="12" width="26" height="34" rx="4" fill="#3B82F6" stroke="#151617" stroke-width="2.5"/>
  <!-- Document lines -->
  <line x1="22" y1="21" x2="36" y2="21" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="27" x2="34" y2="27" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="22" y1="33" x2="32" y2="33" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- AI sparkle -->
  <circle cx="44" cy="16" r="7" fill="#FFBE98" stroke="#151617" stroke-width="2"/>
  <text x="44" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#151617">AI</text>
</svg>
