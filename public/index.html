<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音博主文字稿提取</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --bg: #fbfbfd;
    --card-bg: #ffffff;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --green: #34c759;
    --orange: #ff9f0a;
    --red: #ff3b30;
    --border: rgba(0,0,0,0.06);
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 16px;
    --radius-sm: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Hero ─── */
  .hero {
    text-align: center;
    padding: 80px 24px 60px;
    background: linear-gradient(180deg, #f5f5f7 0%, var(--bg) 100%);
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, #6e6e73 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 19px;
    color: var(--text-secondary);
    margin-top: 12px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  /* ─── Container ─── */
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ─── Card ─── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: box-shadow 0.3s ease;
  }
  .card:hover { box-shadow: var(--shadow-lg); }

  /* ─── Form ─── */
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s ease;
    background: #fafafa;
    color: var(--text);
  }
  input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
  }
  input::placeholder { color: #c7c7cc; }
  .row { display: flex; gap: 14px; }
  .row > * { flex: 1; }

  /* ─── Button ─── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px 32px;
    border: none;
    border-radius: 980px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); transform: scale(1.01); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled {
    background: #d2d2d7;
    cursor: not-allowed;
    transform: none;
  }
  .btn-success {
    background: var(--green);
    color: white;
  }
  .btn-success:hover { filter: brightness(1.05); transform: scale(1.01); }

  /* ─── Progress ─── */
  .progress-wrap {
    background: rgba(0,0,0,0.04);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    margin: 16px 0;
  }
  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: var(--accent);
    transition: width 0.4s ease;
    width: 0%;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 980px;
    font-size: 14px;
    font-weight: 500;
  }
  .pill-info { background: rgba(0,113,227,0.08); color: var(--accent); }
  .pill-success { background: rgba(52,199,89,0.1); color: #248a3d; }
  .pill-error { background: rgba(255,59,48,0.1); color: var(--red); }
  .pill-warning { background: rgba(255,159,10,0.1); color: #c77c00; }
  .elapsed {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: right;
    margin-top: 4px;
  }

  /* ─── Title Scroll ─── */
  .title-scroll {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 16px;
    padding: 16px;
    background: #fafafa;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .title-scroll::-webkit-scrollbar { width: 4px; }
  .title-scroll::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }
  .title-item {
    padding: 6px 0;
    font-size: 14px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(0,0,0,0.03);
    line-height: 1.5;
  }
  .title-item:last-child { border-bottom: none; }
  .title-item.success { color: #248a3d; }
  .title-item.active { color: #c77c00; }
  .title-item.error { color: var(--red); }

  /* ─── Stats ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .stat-card {
    text-align: center;
    padding: 20px 12px;
    background: #f5f5f7;
    border-radius: var(--radius-sm);
  }
  .stat-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  /* ─── Video List ─── */
  .video-list {
    max-height: 320px;
    overflow-y: auto;
    margin: 16px 0;
  }
  .video-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    font-size: 14px;
  }
  .video-item:last-child { border-bottom: none; }
  .video-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 980px;
    margin-left: 12px;
    letter-spacing: 0.02em;
  }
  .badge-done { background: rgba(52,199,89,0.12); color: #248a3d; }
  .badge-fail { background: rgba(255,59,48,0.1); color: var(--red); }
  .badge-na { background: rgba(0,0,0,0.05); color: var(--text-secondary); }

  /* ─── Chat ─── */
  .chat-box {
    max-height: 400px;
    overflow-y: auto;
    padding: 16px;
    background: #f5f5f7;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .chat-bubble {
    margin-bottom: 12px;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    max-width: 80%;
    word-wrap: break-word;
  }
  .chat-bubble.user {
    background: var(--accent);
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 6px;
  }
  .chat-bubble.bot {
    background: white;
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }
  .chat-input-row {
    display: flex;
    gap: 10px;
  }
  .chat-input-row input { flex: 1; border-radius: 980px; }
  .chat-input-row button {
    width: auto;
    padding: 14px 28px;
    border-radius: 980px;
    font-size: 15px;
  }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .hero h1 { font-size: 32px; }
    .hero p { font-size: 16px; }
    .hero { padding: 48px 20px 36px; }
    .card { padding: 24px; }
    .row { flex-direction: column; gap: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>文字稿提取</h1>
  <p>输入抖音博主链接，一键转录全部视频为 Word 文档</p>
</div>

<div class="container">

  <!-- 主输入 -->
  <div class="card">
    <div class="form-group">
      <label>抖音博主链接</label>
      <input type="text" id="douyinUrl" placeholder="粘贴抖音主页链接、短链接或抖音号">
    </div>
    <div class="form-group">
      <label>关键词筛选</label>
      <input type="text" id="keyword" placeholder="可选，空格分隔多个关键词">
    </div>
    <button class="btn btn-primary" id="startBtn" onclick="startExtraction()">
      开始提取
    </button>
  </div>

  <!-- 进度 -->
  <div class="card hidden" id="progressCard">
    <div id="statusPill" class="status-pill pill-info">准备中...</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="elapsed" id="elapsedTime"></div>
    <div class="title-scroll hidden" id="titleScroll"></div>
  </div>

  <!-- 结果 -->
  <div class="card hidden" id="resultCard">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="video-list" id="videoList"></div>
    <button class="btn btn-success" id="downloadBtn" onclick="downloadDoc()">
      下载 Word 文档
    </button>
  </div>

  <!-- 对话 -->
  <div class="card hidden" id="chatCard">
    <div class="chat-box" id="chatBox">
      <div class="chat-bubble bot">你好！我是这位博主的 AI 分身，有什么想聊的？</div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendChat()">
      <button class="btn btn-primary" onclick="sendChat()">发送</button>
    </div>
  </div>

</div>

<!-- Hidden fields for server-fallback config -->
<input type="hidden" id="cookie" value="">
<input type="hidden" id="openaiKey" value="">
<input type="hidden" id="apifyToken" value="">

<script>
let STATE = {
  videos: [],
  creatorName: '',
  secUid: '',
  startTime: null,
  timer: null,
};

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }

function setProgress(pct) {
  $('progressFill').style.width = pct + '%';
}

function setStatus(text, type) {
  const el = $('statusPill');
  el.className = 'status-pill pill-' + type;
  el.textContent = text;
}

function addTitle(text, cls) {
  const scroll = $('titleScroll');
  scroll.classList.remove('hidden');
  const div = document.createElement('div');
  div.className = 'title-item ' + (cls || '');
  div.textContent = text;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
  while (scroll.children.length > 60) scroll.removeChild(scroll.firstChild);
}

function startTimer() {
  STATE.startTime = Date.now();
  STATE.timer = setInterval(() => {
    const s = Math.floor((Date.now() - STATE.startTime) / 1000);
    $('elapsedTime').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  }, 1000);
}
function stopTimer() { if (STATE.timer) clearInterval(STATE.timer); }

async function api(endpoint, body) {
  const r = await fetch('/api/' + endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (r.headers.get('content-type')?.includes('application/json')) {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    return data;
  }
  if (!r.ok) throw new Error('Error ' + r.status);
  return r;
}

async function startExtraction() {
  const url = $('douyinUrl').value.trim();
  if (!url) return alert('请输入抖音链接');

  $('startBtn').disabled = true;
  $('startBtn').textContent = '处理中...';
  show('progressCard');
  hide('resultCard');
  hide('chatCard');
  $('titleScroll').innerHTML = '';
  $('titleScroll').classList.add('hidden');
  startTimer();

  try {
    setStatus('解析链接...', 'info');
    setProgress(3);
    const resolved = await api('resolve-url', { input: url });
    STATE.secUid = resolved.sec_uid;
    addTitle('链接解析成功', 'success');

    setStatus('获取视频列表...', 'info');
    setProgress(8);
    const result = await api('fetch-videos', {
      sec_uid: STATE.secUid,
      keyword: $('keyword').value.trim(),
      max_videos: 0,
    });

    STATE.videos = result.videos;
    STATE.creatorName = result.creator_name || '博主';
    setProgress(20);
    setStatus(`找到 ${STATE.videos.length} 个视频`, 'success');
    STATE.videos.forEach(v => addTitle('▸ ' + v.title.substring(0, 50)));

    if (!STATE.videos.length) {
      setStatus('未找到匹配的视频', 'warning');
      stopTimer();
      $('startBtn').disabled = false;
      $('startBtn').textContent = '开始提取';
      return;
    }

    // 转录
    const queue = STATE.videos.filter(v => v.audio_url);
    if (!queue.length) {
      setStatus('没有可转录的视频', 'warning');
      showResults();
      return;
    }

    $('titleScroll').innerHTML = '';
    let ok = 0, fail = 0;
    for (let i = 0; i < queue.length; i++) {
      const v = queue[i];
      setProgress(20 + (i / queue.length) * 70);
      setStatus(`转录 ${i+1}/${queue.length}`, 'info');
      addTitle('转录中: ' + v.title.substring(0, 45), 'active');

      try {
        const res = await api('transcribe', { audio_url: v.audio_url, video_url: v.url });
        v.transcript = res.transcript;
        ok++;
        addTitle('完成: ' + v.title.substring(0, 45), 'success');
      } catch (e) {
        fail++;
        v.transcript = null;
        addTitle('失败: ' + v.title.substring(0, 40) + ' - ' + e.message, 'error');
      }
    }

    setProgress(100);
    setStatus(`完成 — 成功 ${ok}，失败 ${fail}`, 'success');
    stopTimer();
    showResults();

  } catch (e) {
    setStatus(e.message, 'error');
    stopTimer();
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

function showResults() {
  show('resultCard');
  const total = STATE.videos.length;
  const done = STATE.videos.filter(v => v.transcript).length;
  const audio = STATE.videos.filter(v => v.audio_url).length;

  $('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">视频</div></div>
    <div class="stat-card"><div class="stat-num">${audio}</div><div class="stat-label">音频</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">已转录</div></div>
  `;

  const list = $('videoList');
  list.innerHTML = '';
  STATE.videos.forEach(v => {
    const d = document.createElement('div');
    d.className = 'video-item';
    const badge = v.transcript
      ? '<span class="badge badge-done">已转录</span>'
      : v.audio_url ? '<span class="badge badge-fail">失败</span>' : '<span class="badge badge-na">无音频</span>';
    d.innerHTML = `<span class="video-title">${v.title}</span>${badge}`;
    list.appendChild(d);
  });

  if (done > 0) {
    $('downloadBtn').classList.remove('hidden');
    show('chatCard');
  }
}

async function downloadDoc() {
  $('downloadBtn').disabled = true;
  $('downloadBtn').textContent = '生成中...';
  try {
    const r = await fetch('/api/generate-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videos: STATE.videos, creator_name: STATE.creatorName }),
    });
    if (!r.ok) throw new Error((await r.json()).error);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = STATE.creatorName + '_文字稿合集.docx';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    alert('文档生成失败: ' + e.message);
  } finally {
    $('downloadBtn').disabled = false;
    $('downloadBtn').textContent = '下载 Word 文档';
  }
}

let chatHistory = [];
async function sendChat() {
  const input = $('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const box = $('chatBox');

  const user = document.createElement('div');
  user.className = 'chat-bubble user';
  user.textContent = msg;
  box.appendChild(user);

  const bot = document.createElement('div');
  bot.className = 'chat-bubble bot';
  bot.textContent = '思考中...';
  box.appendChild(bot);
  box.scrollTop = box.scrollHeight;

  try {
    const res = await api('chat', {
      message: msg,
      creator_name: STATE.creatorName,
      videos_context: STATE.videos,
      history: chatHistory,
    });
    chatHistory.push({ role: 'user', content: msg });
    chatHistory.push({ role: 'assistant', content: res.response });
    bot.textContent = res.response;
  } catch (e) {
    bot.textContent = '出错了: ' + e.message;
    bot.style.color = 'var(--red)';
  }
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
