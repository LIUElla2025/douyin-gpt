<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稿了个 AI — 从视频到知识分身</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
  :root {
    --text: #151617;
    --text-secondary: #4a4a4a;
    --text-muted: #888888;
    --bg: #F5F2F0;
    --card-bg: #ffffff;
    --accent: #3B82F6;
    --accent-hover: #2563EB;
    --accent-light: rgba(59,130,246,0.08);
    --accent-border: rgba(59,130,246,0.25);
    --green: #4ECB71;
    --green-light: rgba(78,203,113,0.12);
    --peach: #FFBE98;
    --peach-light: rgba(255,190,152,0.15);
    --orange: #F59E0B;
    --red: #EF4444;
    --dark: #151617;
    --border: #151617;
    --border-light: #E8E4E1;
    --shadow: 4px 4px 0 #151617;
    --shadow-sm: 3px 3px 0 #151617;
    --shadow-hover: 6px 6px 0 #151617;
    --radius: 16px;
    --radius-sm: 12px;
    --radius-lg: 24px;
    --font: 'Space Grotesk', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    --border-w: 2px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Layout ─── */
  .app-shell {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--dark);
    border-right: var(--border-w) solid var(--dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-brand h1 {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.02em;
  }
  .sidebar-brand p {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }
  .sidebar-section-title {
    padding: 16px 20px 8px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 16px;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .sidebar-empty {
    padding: 32px 20px;
    text-align: center;
  }
  .sidebar-empty-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-empty-icon svg { width: 24px; height: 24px; color: rgba(255,255,255,0.3); }
  .sidebar-empty-text {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    line-height: 1.5;
  }
  .avatar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
    margin: 2px 8px;
    border-radius: var(--radius-sm);
  }
  .avatar-item:hover { background: rgba(255,255,255,0.08); }
  .avatar-item.active {
    background: rgba(59,130,246,0.2);
  }
  .avatar-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    border: var(--border-w) solid rgba(255,255,255,0.2);
  }
  .avatar-icon.video-type { background: var(--accent); }
  .avatar-icon.corpus-type { background: var(--green); }
  .avatar-info { flex: 1; overflow: hidden; }
  .avatar-name {
    font-size: 13px;
    font-weight: 600;
    color: #ffffff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .avatar-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .avatar-delete {
    opacity: 0;
    width: 24px;
    height: 24px;
    border: none;
    background: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .avatar-item:hover .avatar-delete { opacity: 1; }
  .avatar-delete:hover { color: var(--red); background: rgba(239,68,68,0.15); }

  /* ─── Main ─── */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
  }
  .main-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ─── Page Header ─── */
  .page-header {
    margin-bottom: 32px;
    background: var(--card-bg);
    border: var(--border-w) solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -20px;
    right: -20px;
    width: 120px;
    height: 120px;
    background: var(--peach);
    border-radius: 50%;
    border: var(--border-w) solid var(--border);
    opacity: 0.6;
    z-index: 0;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: -30px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: var(--accent);
    border-radius: 50%;
    border: var(--border-w) solid var(--border);
    opacity: 0.15;
    z-index: 0;
  }
  .page-header h2 {
    font-family: 'Space Grotesk', var(--font);
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.15;
    position: relative;
    z-index: 1;
  }
  .page-header .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    border: var(--border-w) solid var(--border);
    box-shadow: 2px 2px 0 var(--border);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .page-header p {
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 8px;
    line-height: 1.5;
    position: relative;
    z-index: 1;
  }

  /* ─── Card ─── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 20px;
    border: var(--border-w) solid var(--dark);
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s, transform 0.15s;
  }

  /* ─── Tabs ─── */
  .tab-bar {
    display: inline-flex;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 24px;
    border: var(--border-w) solid var(--dark);
  }
  .tab-btn {
    padding: 8px 20px;
    border: var(--border-w) solid transparent;
    background: none;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    background: white;
    color: var(--text);
    border-color: var(--dark);
    box-shadow: 2px 2px 0 var(--dark);
    font-weight: 700;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Form ─── */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-hint {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 4px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    border: var(--border-w) solid var(--dark);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: all 0.2s;
    background: white;
    color: var(--text);
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 3px 3px 0 var(--accent);
  }
  input::placeholder { color: var(--text-muted); }

  /* ─── Button ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 24px;
    border: var(--border-w) solid var(--dark);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.12s;
    box-shadow: var(--shadow-sm);
  }
  .btn:hover:not(:disabled) {
    box-shadow: var(--shadow-hover);
    transform: translate(-1px, -1px);
  }
  .btn:active:not(:disabled) {
    box-shadow: 1px 1px 0 var(--dark);
    transform: translate(2px, 2px);
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    background: #d1d5db;
    cursor: not-allowed;
    box-shadow: var(--shadow-sm);
    transform: none;
  }
  .btn-success {
    background: var(--green);
    color: var(--dark);
  }
  .btn-success:hover { background: #3dba60; }
  .btn-secondary {
    background: white;
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-row .btn { flex: 1; }

  /* ─── Upload ─── */
  .upload-area {
    border: 2.5px dashed var(--dark);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    margin-bottom: 18px;
  }
  .upload-area:hover { border-color: var(--accent); background: var(--accent-light); box-shadow: var(--shadow-sm); }
  .upload-area.has-file { border-color: var(--green); background: var(--green-light); border-style: solid; }
  .upload-area input[type="file"] { display: none; }
  .upload-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 10px;
    background: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: var(--border-w) solid var(--dark);
    box-shadow: 2px 2px 0 var(--dark);
  }
  .upload-icon svg { width: 22px; height: 22px; color: var(--text-muted); }
  .upload-area.has-file .upload-icon svg { color: var(--green); }
  .upload-text { font-size: 13px; color: var(--text-secondary); }
  .upload-text b { color: var(--accent); font-weight: 600; }
  .upload-filename { font-size: 13px; color: var(--green); font-weight: 600; margin-top: 8px; }

  /* ─── Progress ─── */
  .progress-wrap {
    background: var(--bg);
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin: 14px 0;
    border: var(--border-w) solid var(--dark);
  }
  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: var(--accent);
    transition: width 0.4s ease;
    width: 0%;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: var(--border-w) solid var(--dark);
    box-shadow: 2px 2px 0 var(--dark);
  }
  .pill-info { background: var(--accent-light); color: var(--accent); }
  .pill-success { background: var(--green-light); color: #2a9d4e; }
  .pill-error { background: rgba(239,68,68,0.1); color: var(--red); }
  .pill-warning { background: var(--peach-light); color: #c57a2a; }
  .elapsed {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Title Scroll ─── */
  .title-scroll {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: var(--border-w) solid var(--dark);
    font-size: 13px;
  }
  .title-scroll::-webkit-scrollbar { width: 4px; }
  .title-scroll::-webkit-scrollbar-thumb { background: var(--dark); border-radius: 2px; }
  .title-item {
    padding: 4px 0;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border-light);
    line-height: 1.5;
  }
  .title-item:last-child { border-bottom: none; }
  .title-item.success { color: #2a9d4e; }
  .title-item.active { color: #c57a2a; }
  .title-item.error { color: var(--red); }
  .title-item.info { color: var(--accent); }

  /* ─── Stats ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat-card {
    text-align: center;
    padding: 16px 10px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: var(--border-w) solid var(--dark);
    box-shadow: var(--shadow-sm);
  }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ─── Video List ─── */
  .video-list {
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 18px;
  }
  .video-list::-webkit-scrollbar { width: 4px; }
  .video-list::-webkit-scrollbar-thumb { background: var(--dark); border-radius: 2px; }
  .video-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .video-item:last-child { border-bottom: none; }
  .video-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    margin-left: 10px;
    flex-shrink: 0;
    border: var(--border-w) solid var(--dark);
  }
  .badge-done { background: var(--green-light); color: #2a9d4e; }
  .badge-fail { background: rgba(239,68,68,0.1); color: var(--red); }
  .badge-na { background: var(--border-light); color: var(--text-muted); }

  /* ─── Chat ─── */
  .chat-box {
    max-height: 70vh;
    overflow-y: auto;
    padding: 20px;
    background: var(--bg);
    border-radius: var(--radius);
    margin-bottom: 14px;
    border: var(--border-w) solid var(--dark);
  }
  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--dark); border-radius: 2px; }
  .chat-bubble {
    margin-bottom: 10px;
    padding: 12px 16px;
    max-width: 100%;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.7;
    word-wrap: break-word;
    border: var(--border-w) solid var(--dark);
  }
  .chat-bubble.user {
    background: var(--accent);
    color: white;
    margin-left: auto;
    box-shadow: 2px 2px 0 var(--dark);
  }
  .chat-bubble.bot {
    background: white;
    color: var(--text);
    box-shadow: 2px 2px 0 var(--dark);
    position: relative;
  }
  .chat-bubble.bot .copy-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    padding: 2px 8px;
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border-light);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chat-bubble.bot .copy-btn:hover {
    color: var(--text);
    border-color: var(--dark);
  }
  .chat-bubble.bot .copy-btn svg {
    width: 14px;
    height: 14px;
  }
  .chat-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }
  .btn-copy-all {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    font-size: 13px;
    background: white;
    border: var(--border-w) solid var(--dark);
    border-radius: var(--radius-sm);
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--dark);
    transition: all 0.15s;
  }
  .btn-copy-all:hover { background: var(--bg); }
  .emoji-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .emoji-toggle input { cursor: pointer; }
  .btn-copy-all svg { width: 14px; height: 14px; }
  .chat-input-row {
    display: flex;
    gap: 8px;
  }
  .chat-input-row input {
    flex: 1;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
  }
  .chat-input-row button {
    width: auto;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }

  /* ─── History ─── */
  .history-section {
    margin-top: 18px;
    padding-top: 18px;
    border-top: var(--border-w) solid var(--border-light);
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .history-toggle {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }
  .history-list { margin-top: 10px; }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    margin-bottom: 6px;
    background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    font-size: 13px;
    border: var(--border-w) solid var(--dark);
    box-shadow: 2px 2px 0 var(--dark);
  }
  .history-item:hover {
    box-shadow: var(--shadow-sm);
    transform: translate(-1px, -1px);
  }
  .history-item .h-main {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item .h-name { font-weight: 600; color: var(--text); }
  .history-item .h-kw {
    font-size: 11px;
    color: var(--accent);
    margin-left: 6px;
    font-weight: 600;
  }
  .history-item .h-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 10px;
    white-space: nowrap;
  }

  /* ─── Resume Banner ─── */
  .resume-banner {
    background: var(--peach-light);
    border: var(--border-w) solid var(--dark);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    box-shadow: var(--shadow-sm);
  }
  .resume-banner strong { color: var(--accent); }

  .hidden { display: none !important; }

  /* ─── Responsive ─── */
  @media (max-width: 800px) {
    .app-shell { flex-direction: column; height: auto; min-height: 100vh; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      max-height: 180px;
      border-right: none;
      border-bottom: var(--border-w) solid var(--dark);
    }
    .sidebar-brand { padding: 16px 20px 14px; }
    .sidebar-brand h1 { font-size: 16px; }
    .main { overflow-y: visible; }
    .main-inner { padding: 24px 16px 60px; }
  }
  @media (max-width: 600px) {
    .page-header { padding: 24px 20px; }
    .page-header h2 { font-size: 26px; }
    .page-header::before { width: 80px; height: 80px; top: -15px; right: -15px; }
    .card { padding: 20px; box-shadow: var(--shadow-sm); }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .btn-row { flex-direction: column; }
    .tab-bar { display: flex; }
    .tab-btn { flex: 1; text-align: center; }
  }
</style>
</head>
<body>

</div>

<!-- Hidden fields for server-fallback config -->
<input type="hidden" id="cookie" value="">
<input type="hidden" id="openaiKey" value="">
<input type="hidden" id="apifyToken" value="">

<script>
let STATE = {
  videos: [],
  creatorName: '',
  secUid: '',
  startTime: null,
  timer: null,
};

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function switchTab(tab) {
  const tabs = { douyin: 'tabDouyin', upload: 'tabUpload' };
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === (tab === 'douyin' ? 0 : 1));
  });
  Object.entries(tabs).forEach(([key, id]) => {
    $(id).classList.toggle('active', key === tab);
  });
}

function setProgress(pct) {
  $('progressFill').style.width = pct + '%';
}

function setStatus(text, type) {
  const el = $('statusPill');
  el.className = 'status-pill pill-' + type;
  el.textContent = text;
}

function addTitle(text, cls) {
  const scroll = $('titleScroll');
  scroll.classList.remove('hidden');
  const div = document.createElement('div');
  div.className = 'title-item ' + (cls || '');
  div.textContent = text;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
  while (scroll.children.length > 60) scroll.removeChild(scroll.firstChild);
}

function startTimer() {
  STATE.startTime = Date.now();
  STATE.timer = setInterval(() => {
    const s = Math.floor((Date.now() - STATE.startTime) / 1000);
    $('elapsedTime').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  }, 1000);
}
function stopTimer() { if (STATE.timer) clearInterval(STATE.timer); }

async function api(endpoint, body) {
  const r = await fetch('/api/' + endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (r.headers.get('content-type')?.includes('application/json')) {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    return data;
  }
  if (!r.ok) throw new Error('Error ' + r.status);
  return r;
}

// ─── 缓存系统（视频列表 + 转录结果）───
const CACHE_PREFIX = 'dy-';

function _cacheKey(secUid, keyword) {
  const kw = (keyword || '').trim();
  return CACHE_PREFIX + 'videos-' + secUid + (kw ? '-kw-' + kw : '');
}

function saveVideoList(secUid, videos, creatorName, keyword) {
  try {
    const data = { videos, creatorName, keyword: (keyword || '').trim(), savedAt: Date.now() };
    localStorage.setItem(_cacheKey(secUid, keyword), JSON.stringify(data));
  } catch(e) {}
}

function loadVideoList(secUid, keyword) {
  try {
    const raw = localStorage.getItem(_cacheKey(secUid, keyword));
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.savedAt > 7 * 24 * 3600 * 1000) return null;
    return data;
  } catch(e) { return null; }
}

function saveTranscript(videoId, transcript) {
  try { localStorage.setItem(CACHE_PREFIX + 'tr-' + videoId, JSON.stringify(transcript)); } catch(e) {}
}

function loadTranscript(videoId) {
  try {
    const d = localStorage.getItem(CACHE_PREFIX + 'tr-' + videoId);
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

function restoreTranscripts(videos) {
  let count = 0;
  videos.forEach(v => {
    const saved = loadTranscript(v.id);
    if (saved) { v.transcript = saved; count++; }
  });
  return count;
}

// ─── SSE 获取视频列表（支持超时自动续传）───
async function fetchVideosSSE(secUid, keyword) {
  STATE.videos = [];
  STATE.creatorName = '';
  let resumeCursor = 0;
  let resumePage = 0;
  let totalScanned = 0;
  let round = 0;

  while (true) {
    round++;
    const prevMatched = STATE.videos.length;
    const result = await _fetchVideosOnce(secUid, keyword, resumeCursor, resumePage, totalScanned, prevMatched);

    totalScanned = result.total_scanned || totalScanned;
    STATE._totalScanned = totalScanned;
    STATE._stopReason = result.stop_reason || '';

    if (result.stop_reason === 'timeout' && result.resume_cursor) {
      resumeCursor = result.resume_cursor;
      resumePage = result.resume_page || 0;
      addTitle(`第 ${round} 轮扫描超时，已扫描 ${totalScanned} 个，自动续传...`, 'info');
      continue;
    }
    break;
  }

  return { videos: STATE.videos, creator_name: STATE.creatorName };
}

function _fetchVideosOnce(secUid, keyword, startCursor, startPage, prevScanned, prevMatched) {
  return new Promise((resolve, reject) => {
    const body = JSON.stringify({
      sec_uid: secUid,
      keyword: keyword,
      max_videos: 0,
      start_cursor: startCursor,
      start_page: startPage,
      prev_scanned: prevScanned,
      prev_matched: prevMatched || 0,
    });

    fetch('/api/fetch-videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body,
    }).then(resp => {
      if (!resp.ok) {
        return resp.json().then(d => { throw new Error(d.error || 'Error'); });
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function processSSE(text) {
        buffer += text;
        const lines = buffer.split('\n');
        buffer = lines.pop();

        let eventType = '';
        let eventData = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            eventType = line.slice(7).trim();
          } else if (line.startsWith('data: ')) {
            eventData = line.slice(6);
          } else if (line === '' && eventType && eventData) {
            handleSSEvent(eventType, JSON.parse(eventData));
            eventType = '';
            eventData = '';
          }
        }
      }

      function handleSSEvent(type, data) {
        if (type === 'status') {
          setStatus(data.msg, 'info');
          if (data.total > 0 && data.fetched !== undefined) {
            setProgress(8 + Math.min((data.fetched / data.total) * 12, 12));
          }
        } else if (type === 'profile') {
          STATE.creatorName = data.creator_name || STATE.creatorName || '博主';
          if (!startCursor) {
            addTitle(`博主：${STATE.creatorName}（共 ${data.total_videos} 个视频）`, 'success');
          }
        } else if (type === 'videos') {
          data.videos.forEach(v => {
            STATE.videos.push(v);
            addTitle(`${STATE.videos.length}. ${v.title.substring(0, 50)}`);
          });
          setStatus(`已获取 ${data.fetched}/${data.total} 个匹配视频...`, 'info');
          if (data.total > 0) {
            setProgress(8 + Math.min((data.fetched / data.total) * 12, 12));
          }
        } else if (type === 'done') {
          if (!startCursor) {
            STATE.videos = data.videos;
          }
          STATE.creatorName = data.creator_name || STATE.creatorName;
          resolve(data);
        } else if (type === 'error') {
          reject(new Error(data.error));
        }
      }

      function pump() {
        return reader.read().then(({ done, value }) => {
          if (done) {
            if (buffer) processSSE('\n');
            if (!STATE.videos.length && !startCursor) reject(new Error('未获取到视频'));
            else resolve({ videos: STATE.videos, creator_name: STATE.creatorName });
            return;
          }
          processSSE(decoder.decode(value, { stream: true }));
          return pump();
        });
      }

      return pump();
    }).catch(reject);
  });
}

// ─── 主流程 ───
async function startExtraction() {
  const url = $('douyinUrl').value.trim();
  if (!url) return alert('请输入抖音链接');

  $('startBtn').disabled = true;
  $('startBtn').textContent = '解析中...';

  try {
    const resolved = await api('resolve-url', { input: url });
    STATE.secUid = resolved.sec_uid;

    const kw = $('keyword').value.trim();
    const cached = loadVideoList(STATE.secUid, kw);
    if (cached && cached.videos.length > 0) {
      const transcribed = restoreTranscripts(cached.videos);
      const remaining = cached.videos.filter(v => !v.transcript && (v.dash_audio_url || v.video_download_url || v.audio_url)).length;
      const kwInfo = cached.keyword ? `，关键词「${cached.keyword}」` : '';

      $('resumeInfo').textContent =
        `发现「${cached.creatorName}」的缓存${kwInfo}：${cached.videos.length} 个视频，` +
        `已转录 ${transcribed} 个，剩余 ${remaining} 个待转录`;
      show('resumeBanner');
      hide('startBtn');

      STATE._cachedData = cached;
      STATE._cachedUrl = url;
    } else {
      await doFullExtraction(url);
    }
  } catch(e) {
    alert('解析失败：' + e.message);
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

async function resumeExtraction() {
  hide('resumeBanner');
  show('startBtn');
  $('startBtn').disabled = true;
  $('startBtn').textContent = '处理中...';

  const cached = STATE._cachedData;
  STATE.videos = cached.videos;
  STATE.creatorName = cached.creatorName;
  STATE._corpusMode = false;
  STATE._corpusText = '';
  STATE._corpusInstructions = '';

  restoreTranscripts(STATE.videos);
  saveToHistory(STATE._cachedUrl, $('keyword').value.trim(), STATE.creatorName);

  show('progressCard');
  hide('resultCard');
  hide('chatCard');
  $('titleScroll').innerHTML = '';
  $('titleScroll').classList.add('hidden');
  startTimer();

  try {
    // 所有未转录的视频都需要获取/刷新下载链接
    const todo = STATE.videos.filter(v => !v.transcript);
    if (todo.length > 0 && STATE.secUid) {
      // 第1步：通过列表API批量刷新（已有URL的视频）
      const withUrl = todo.filter(v => v.dash_audio_url || v.video_download_url || v.audio_url);
      if (withUrl.length > 0) {
        addTitle(`刷新 ${withUrl.length} 个视频的下载链接...`, 'active');
        setStatus('刷新下载链接...', 'info');
        const kw = $('keyword').value.trim();
        const freshVideos = await _fetchFreshUrls(STATE.secUid, kw, withUrl.map(v => v.id));
        const urlMap = {};
        for (const fv of freshVideos) { urlMap[fv.id] = fv; }
        for (const v of STATE.videos) {
          if (!v.transcript && urlMap[v.id]) {
            v.dash_audio_url = urlMap[v.id].dash_audio_url || v.dash_audio_url || '';
            v.audio_url = urlMap[v.id].audio_url || v.audio_url || '';
            v.video_download_url = urlMap[v.id].video_download_url || v.video_download_url || '';
          }
        }
      }

      const kw = $('keyword').value.trim();
      saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, kw);
    }

    // 第2步：通过详情API逐个补全缺URL的视频
    await fillMissingUrls();
    await doTranscription();
  } catch (e) {
    setStatus(e.message, 'error');
    stopTimer();
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

async function _fetchFreshUrls(secUid, keyword, targetIds) {
  return new Promise((resolve) => {
    const allVideos = [];
    const payload = { sec_uid: secUid, keyword: keyword || '' };
    if (targetIds && targetIds.length) payload.target_ids = targetIds;
    const body = JSON.stringify(payload);
    fetch('/api/fetch-videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    }).then(resp => {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      function pump() {
        reader.read().then(({ done, value }) => {
          if (done) { resolve(allVideos); return; }
          buf += decoder.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop();
          for (const block of parts) {
            const lines = block.split('\n');
            let evtType = '', evtData = '';
            for (const l of lines) {
              if (l.startsWith('event: ')) evtType = l.slice(7);
              if (l.startsWith('data: ')) evtData = l.slice(6);
            }
            if (!evtData) continue;
            try {
              const d = JSON.parse(evtData);
              if (evtType === 'videos' && d.videos) allVideos.push(...d.videos);
              if (evtType === 'status' && d.msg) {
                setStatus(`刷新链接: ${d.msg}`, 'info');
                if (d.page && d.total_pages) setProgress(Math.min(Math.round((d.page / d.total_pages) * 20), 20));
              }
            } catch {}
          }
          pump();
        }).catch(() => resolve(allVideos));
      }
      pump();
    }).catch(() => resolve(allVideos));
  });
}

async function _refreshUrlsViaDetail(videoIds) {
  return new Promise((resolve, reject) => {
    const results = {};
    const body = JSON.stringify({ video_ids: videoIds });
    fetch('/api/refresh-urls', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    }).then(resp => {
      if (!resp.ok) {
        console.warn('refresh-urls returned', resp.status);
        resolve(results);
        return;
      }
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      function pump() {
        reader.read().then(({ done, value }) => {
          if (done) { resolve(results); return; }
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const d = JSON.parse(line.slice(6));
                if (d.results) Object.assign(results, d.results);
                if (d.msg) setStatus(d.msg, 'info');
              } catch {}
            }
          }
          pump();
        }).catch(() => resolve(results));
      }
      pump();
    }).catch(() => resolve(results));
  });
}

async function freshExtraction() {
  hide('resumeBanner');
  show('startBtn');
  STATE._cachedData = null;
  if (STATE.secUid) {
    const kw = $('keyword').value.trim();
    try { localStorage.removeItem(_cacheKey(STATE.secUid, kw)); } catch(e) {}
  }
  await doFullExtraction(STATE._cachedUrl || $('douyinUrl').value.trim());
}

async function doFullExtraction(url) {
  $('startBtn').disabled = true;
  $('startBtn').textContent = '处理中...';
  show('progressCard');
  hide('resultCard');
  hide('chatCard');
  $('titleScroll').innerHTML = '';
  $('titleScroll').classList.add('hidden');
  chatHistory = [];
  STATE._corpusMode = false;
  STATE._corpusText = '';
  STATE._corpusInstructions = '';
  startTimer();

  try {
    if (!STATE.secUid) {
      setStatus('解析链接...', 'info');
      setProgress(3);
      const resolved = await api('resolve-url', { input: url });
      STATE.secUid = resolved.sec_uid;
    }
    addTitle('链接解析成功', 'success');

    setStatus('获取视频列表...', 'info');
    setProgress(8);
    const kw = $('keyword').value.trim();

    // 先加载之前的缓存（如果有）
    const prevCache = loadVideoList(STATE.secUid, kw);
    const prevVideos = prevCache ? prevCache.videos : [];

    await fetchVideosSSE(STATE.secUid, kw);

    // 合并：将之前缓存中有但本次扫描未获取到的视频补回来
    if (prevVideos.length > 0) {
      const newIds = new Set(STATE.videos.map(v => v.id));
      let merged = 0;
      for (const pv of prevVideos) {
        if (!newIds.has(pv.id)) {
          STATE.videos.push(pv);
          merged++;
        }
      }
      if (merged > 0) {
        addTitle(`从上次缓存中合并了 ${merged} 个本次未扫到的视频`, 'info');
      }
    }

    setProgress(20);
    const scannedInfo = STATE._totalScanned ? `（共扫描 ${STATE._totalScanned} 个视频）` : '';
    const stopInfo = STATE._stopReason ? ` [${STATE._stopReason}]` : '';
    setStatus(`共 ${STATE.videos.length} 个视频${scannedInfo}${stopInfo}`, 'success');
    if (STATE._stopReason) addTitle(`扫描结束原因：${STATE._stopReason}`, 'info');
    saveToHistory(url, kw, STATE.creatorName);

    saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, kw);

    if (!STATE.videos.length) {
      setStatus('未找到匹配的视频', 'warning');
      stopTimer();
      $('startBtn').disabled = false;
      $('startBtn').textContent = '开始提取';
      return;
    }

    restoreTranscripts(STATE.videos);
    await fillMissingUrls();
    await doTranscription();

  } catch (e) {
    setStatus(e.message, 'error');
    stopTimer();
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

async function doTranscription() {
  const keyword = $('keyword').value.trim();
  const queue = STATE.videos.filter(v => v.dash_audio_url || v.video_download_url || v.audio_url);
  if (!queue.length) {
    setStatus('没有可转录的视频', 'warning');
    showResults();
    stopTimer();
    return;
  }

  $('titleScroll').innerHTML = '';
  const cached = queue.filter(v => v.transcript).length;
  let todo = queue.filter(v => !v.transcript);

  if (cached > 0) {
    addTitle(`从缓存恢复 ${cached} 个已转录视频`, 'success');
  }

  if (todo.length === 0) {
    addTitle('所有视频均已转录，无需重复操作', 'success');
    setProgress(100);
    setStatus(`全部完成 — ${cached} 个视频已转录`, 'success');
    stopTimer();
    showResults();
    saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, keyword);
    return;
  }

  const noMedia = STATE.videos.length - queue.length;
  if (noMedia > 0) {
    addTitle(`${STATE.videos.length} 个视频中，${queue.length} 个有音频链接，${noMedia} 个无法获取音频`, 'info');
  }

  // ─── 5路并行转录 + 自动重试 ───
  const CONCURRENCY = 5;
  const MAX_RETRIES = 3;
  const MAX_ROUNDS = 3;  // 最多3轮自动重试
  let totalOk = cached, totalFail = 0;

  for (let round = 0; round < MAX_ROUNDS; round++) {
    if (round > 0) {
      // 自动重试：重新收集失败的视频
      todo = queue.filter(v => !v.transcript);
      if (todo.length === 0) break;
      addTitle(`── 第${round + 1}轮自动重试：${todo.length} 个待转录 ──`, 'info');
      await new Promise(r => setTimeout(r, 3000));  // 等3秒再重试
    }

    addTitle(`开始转录 ${todo.length} 个视频（${CONCURRENCY}路并行）...`, 'success');

    let completed = 0;
    let roundOk = 0, roundFail = 0;

    // 并行工作池
    async function transcribeOne(v, idx) {
      for (let retry = 0; retry < MAX_RETRIES; retry++) {
        try {
          // 优先在浏览器端下载 DASH 音频（避免 URL 过期 + Vercel IP 被封）
          let audioBlob = null;
          const audioSrc = v.dash_audio_url || v.video_download_url || '';
          if (audioSrc) {
            try {
              const audioResp = await fetch(audioSrc);
              if (audioResp.ok) audioBlob = await audioResp.blob();
            } catch(e) { /* 浏览器跨域限制，降级到后端下载 */ }
          }

          let res;
          if (audioBlob && audioBlob.size > 1000) {
            // 方案A：浏览器下载成功，直接上传音频数据给后端转录
            const formData = new FormData();
            formData.append('audio', audioBlob, `${v.id}.m4a`);
            formData.append('config', JSON.stringify({
              openai_api_key: getConfig().openai_api_key,
              proxy: getConfig().proxy,
            }));
            const uploadResp = await fetch(API_BASE + '/api/transcribe-upload', {
              method: 'POST', body: formData,
            });
            res = await uploadResp.json();
            if (uploadResp.status !== 200) throw new Error(res.error || '转录失败');
          } else {
            // 方案B：降级到后端下载（URL 可能已过期）
            res = await api('transcribe', {
              dash_audio_url: v.dash_audio_url || '',
              audio_url: v.audio_url || '',
              video_download_url: v.video_download_url || '',
              video_url: v.url,
              aweme_id: v.id || '',
              sec_uid: STATE.secUid || '',
            });
          }
          v.transcript = res.transcript;
          saveTranscript(v.id, res.transcript);
          completed++;
          roundOk++;
          totalOk++;
          const pct = 20 + (totalOk / queue.length) * 70;
          setProgress(pct);
          setStatus(`转录 ${completed}/${todo.length}：${v.title.substring(0, 25)}...`, 'info');
          addTitle(`${completed}/${todo.length} 完成：${v.title.substring(0, 42)}`, 'success');
          return;
        } catch (e) {
          if (retry < MAX_RETRIES - 1) {
            addTitle(`重试(${retry + 1})：${v.title.substring(0, 30)} - ${e.message}`, 'info');
            await new Promise(r => setTimeout(r, 2000 * (retry + 1)));
          } else {
            completed++;
            roundFail++;
            addTitle(`失败：${v.title.substring(0, 35)} - ${e.message}`, 'error');
          }
        }
      }
    }

    // 用信号量控制并发数
    let running = 0;
    let nextIdx = 0;
    await new Promise((resolveAll) => {
      function launchNext() {
        while (running < CONCURRENCY && nextIdx < todo.length) {
          const idx = nextIdx++;
          running++;
          transcribeOne(todo[idx], idx).then(() => {
            running--;
            // 每10个视频保存一次进度
            if (completed % 10 === 0) {
              saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, keyword);
            }
            if (nextIdx >= todo.length && running === 0) {
              resolveAll();
            } else {
              launchNext();
            }
          }).catch((err) => {
            running--;
            completed++;
            console.error('转录异常:', err);
            if (nextIdx >= todo.length && running === 0) {
              resolveAll();
            } else {
              launchNext();
            }
          });
        }
        if (todo.length === 0) resolveAll();
      }
      launchNext();
    });

    totalFail = queue.filter(v => !v.transcript).length;
    addTitle(`第${round + 1}轮完成：成功 ${roundOk}，失败 ${totalFail}`, totalFail > 0 ? 'warning' : 'success');
    saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, keyword);

    // 如果没有失败的，不需要下一轮
    if (totalFail === 0) break;
    // 如果这轮一个都没成功，说明问题不是暂时的，不再重试
    if (roundOk === 0) {
      addTitle(`本轮无新增成功，停止重试`, 'warning');
      break;
    }
  }

  saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, keyword);

  setProgress(100);
  const finalFail = queue.filter(v => !v.transcript).length;
  setStatus(`完成 — 成功 ${totalOk}，失败 ${finalFail}，无音频 ${noMedia || 0}`, 'success');
  stopTimer();
  showResults();
}

async function proofreadAll() {
  const btn = $('proofreadBtn');
  btn.disabled = true;

  const withTranscript = STATE.videos.filter(v => {
    const t = v.transcript;
    if (!t) return false;
    const text = typeof t === 'string' ? t : (t.text || '');
    return text.length > 10;
  });

  if (!withTranscript.length) {
    alert('没有可校对的文稿');
    btn.disabled = false;
    return;
  }

  let done = 0;
  let fixed = 0;
  for (const v of withTranscript) {
    done++;
    btn.textContent = `校对中 ${done}/${withTranscript.length}...`;
    const t = v.transcript;
    const text = typeof t === 'string' ? t : (t.text || '');
    try {
      const r = await fetch('/api/polish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, force: true }),
      });
      if (r.ok) {
        const d = await r.json();
        if (!d.skipped && d.polished && d.polished !== text) {
          if (typeof t === 'string') {
            v.transcript = d.polished;
          } else {
            t.text = d.polished;
            t.segments = [];
          }
          saveTranscript(v.id, v.transcript);
          fixed++;
        }
      }
    } catch (e) {
      console.warn(`proofread failed for ${v.title}:`, e);
    }
  }

  // 更新缓存
  const kw = $('keyword').value.trim();
  saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, kw);

  btn.disabled = false;
  btn.textContent = '校对文稿（修错别字）';
  alert(`校对完成！共 ${withTranscript.length} 条文稿，修正了 ${fixed} 条。`);
}

async function downloadDoc() {
  $('downloadBtn').disabled = true;
  try {
    // 第1步：逐个给无标点文稿加标点
    const needPolish = STATE.videos.filter(v => {
      const t = v.transcript;
      if (!t) return false;
      const text = typeof t === 'string' ? t : (t.text || '');
      if (!text || text.length < 20) return false;
      const puncts = [...text].filter(c => "，。！？、；：\u201c\u201d\u2018\u2019（）…—".includes(c)).length;
      return puncts / text.length < 0.01;
    });

    if (needPolish.length > 0) {
      let polished = 0;
      for (const v of needPolish) {
        polished++;
        $('downloadBtn').textContent = `加标点 ${polished}/${needPolish.length}...`;
        const t = v.transcript;
        const text = typeof t === 'string' ? t : (t.text || '');
        try {
          const r = await fetch('/api/polish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          });
          if (r.ok) {
            const d = await r.json();
            if (!d.skipped && d.polished) {
              if (typeof t === 'string') {
                v.transcript = d.polished;
              } else {
                t.text = d.polished;
                t.segments = [];
              }
              saveTranscript(v.id, v.transcript);
            }
          }
        } catch (e) {
          console.warn(`polish failed for ${v.title}:`, e);
        }
      }
      // 更新缓存
      const kw = $('keyword').value.trim();
      saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, kw);
    }

    // 第2步：生成文档
    $('downloadBtn').textContent = '生成文档...';
    const r = await fetch('/api/generate-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videos: STATE.videos, creator_name: STATE.creatorName }),
    });
    if (!r.ok) {
      let errMsg = 'Error ' + r.status;
      try { errMsg = (await r.json()).error || errMsg; } catch {}
      throw new Error(errMsg);
    }
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = STATE.creatorName + '_文字稿合集.docx';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    alert('文档生成失败：' + e.message);
  } finally {
    $('downloadBtn').disabled = false;
    $('downloadBtn').textContent = '下载 Word 文档';
  }
}

// ─── AI 分身侧边栏 ───
const AVATARS_KEY = 'dy-avatars';

function loadAvatars() {
  try { return JSON.parse(localStorage.getItem(AVATARS_KEY) || '[]'); } catch(e) { return []; }
}

function saveAvatars(list) {
  try { localStorage.setItem(AVATARS_KEY, JSON.stringify(list)); } catch(e) {}
}

function saveAvatar(secUid, creatorName, keyword, videoCount, transcribedCount) {
  const list = loadAvatars();
  const idx = list.findIndex(a => a.secUid === secUid && a.keyword === (keyword || ''));
  const entry = {
    secUid, creatorName,
    keyword: keyword || '',
    videoCount, transcribedCount,
    savedAt: Date.now(),
  };
  if (idx >= 0) { list[idx] = entry; } else { list.unshift(entry); }
  saveAvatars(list);
  renderAvatars();
}

function deleteAvatar(secUid, keyword) {
  const old = loadAvatars();
  const target = old.find(a => a.secUid === secUid && a.keyword === (keyword || ''));
  if (target && target.type === 'corpus') {
    try { localStorage.removeItem('dy-corpus-' + secUid); } catch(e) {}
  }
  const list = old.filter(a => !(a.secUid === secUid && a.keyword === (keyword || '')));
  saveAvatars(list);
  renderAvatars();
}

function renderAvatars() {
  const list = loadAvatars();
  const el = $('avatarList');
  if (!list.length) {
    el.innerHTML = `<div class="sidebar-empty">
      <div class="sidebar-empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.118a7.5 7.5 0 0115 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.5-1.632z"/></svg>
      </div>
      <div class="sidebar-empty-text">提取视频文字稿或上传文档<br>即可创建 AI 分身</div>
    </div>`;
    return;
  }
  el.innerHTML = '';
  list.forEach(a => {
    const div = document.createElement('div');
    div.className = 'avatar-item';
    const isActive = a.type === 'corpus'
      ? STATE.secUid === a.secUid
      : STATE.secUid === a.secUid && ($('keyword').value.trim() || '') === a.keyword;
    if (isActive) div.classList.add('active');

    const initial = (a.creatorName || '?')[0];
    let metaText = '';
    if (a.type === 'corpus') {
      metaText = `${((a.charCount || 0) / 1000).toFixed(0)}K 字 · ${a.filename || '文档'}`;
    } else {
      const kwTag = a.keyword ? ` · ${a.keyword}` : '';
      metaText = `${a.transcribedCount}/${a.videoCount} 已转录${kwTag}`;
    }
    const iconClass = a.type === 'corpus' ? 'corpus-type' : 'video-type';
    div.innerHTML = `
      <div class="avatar-icon ${iconClass}">${esc(initial)}</div>
      <div class="avatar-info">
        <div class="avatar-name">${esc(a.creatorName || '未知')}</div>
        <div class="avatar-meta">${esc(metaText)}</div>
      </div>
      <button class="avatar-delete" title="删除">×</button>
    `;
    div.querySelector('.avatar-delete').onclick = (e) => { e.stopPropagation(); deleteAvatar(a.secUid, a.keyword); };
    div.onclick = () => switchAvatar(a);
    el.appendChild(div);
  });
}

function switchAvatar(avatar) {
  if (avatar.type === 'corpus') {
    switchCorpusAvatar(avatar.secUid);
    return;
  }

  const cached = loadVideoList(avatar.secUid, avatar.keyword);
  if (!cached) {
    alert('该分身的数据已过期，请重新提取');
    deleteAvatar(avatar.secUid, avatar.keyword);
    return;
  }

  STATE._corpusMode = false;
  STATE._corpusText = '';
  STATE._corpusInstructions = '';
  STATE.secUid = avatar.secUid;
  STATE.videos = cached.videos;
  STATE.creatorName = cached.creatorName || avatar.creatorName;
  $('keyword').value = avatar.keyword || '';

  restoreTranscripts(STATE.videos);

  chatHistory = [];
  $('chatBox').innerHTML = `<div class="chat-bubble bot">你好！我是「${esc(STATE.creatorName)}」的 AI 分身，有什么想聊的？</div>`;
  _loadChatHistory();

  showResults();
  show('chatCard');
  hide('progressCard');
  renderAvatars();
}

renderAvatars();

// ─── 上传语料创建分身 ───
let _selectedFile = null;

function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  _selectedFile = file;
  $('uploadArea').classList.add('has-file');
  const fname = $('uploadFilename');
  fname.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + 'KB)';

}

async function createCorpusAvatar() {
  const name = $('corpusName').value.trim();
  if (!name) { alert('请输入分身名称'); return; }
  if (!_selectedFile) { alert('请选择文档文件'); return; }

  const btn = $('uploadBtn');
  btn.disabled = true;
  btn.textContent = '解析中...';

  try {
    const formData = new FormData();
    formData.append('file', _selectedFile);
    formData.append('avatar_name', name);

    const resp = await fetch('/api/upload-corpus', {
      method: 'POST',
      body: formData,
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Upload failed');

    const instructions = $('corpusInstructions').value.trim();

    const corpusId = 'corpus-' + Date.now();
    const corpusData = {
      id: corpusId, type: 'corpus',
      avatarName: name, text: data.text,
      charCount: data.char_count,
      instructions: instructions,
      filename: _selectedFile.name,
      savedAt: Date.now(),
    };
    localStorage.setItem('dy-corpus-' + corpusId, JSON.stringify(corpusData));

    const avatars = loadAvatars();
    avatars.unshift({
      secUid: corpusId, creatorName: name,
      keyword: '', videoCount: 0, transcribedCount: 0,
      type: 'corpus', charCount: data.char_count,
      filename: _selectedFile.name, instructions: instructions,
      savedAt: Date.now(),
    });
    saveAvatars(avatars);
    renderAvatars();

    switchCorpusAvatar(corpusId);

    $('corpusName').value = '';
    $('corpusInstructions').value = '';
    $('corpusFile').value = '';
    _selectedFile = null;
    $('uploadArea').classList.remove('has-file');
    $('uploadFilename').classList.add('hidden');
  } catch (e) {
    alert('创建失败：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '创建分身';
  }
}

function switchCorpusAvatar(corpusId) {
  const raw = localStorage.getItem('dy-corpus-' + corpusId);
  if (!raw) {
    alert('语料数据已过期，请重新上传');
    return;
  }
  const corpus = JSON.parse(raw);

  STATE._corpusMode = true;
  STATE._corpusText = corpus.text;
  STATE._corpusInstructions = corpus.instructions || '';

  _loadChatHistory();

  show('chatCard');
  hide('progressCard');
  hide('resultCard');
  renderAvatars();
}

function _stripEmoji(text) {
  return text.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{1F300}-\u{1FAFF}\u{FE00}-\u{FE0F}\u{200D}]+/gu, '').replace(/\s{2,}/g, ' ').trim();
}

function _formatMd(text) {
  // 简易 Markdown → HTML：段落、加粗、列表、分隔线
  const showEmoji = document.getElementById('emojiToggle') ? document.getElementById('emojiToggle').checked : true;
  if (!showEmoji) text = _stripEmoji(text);
  let html = esc(text);
  // 加粗 **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // 分隔线 ---
  html = html.replace(/^-{3,}$/gm, '<hr style="border:none;border-top:1px solid var(--border-light);margin:12px 0">');
  // 列表项 - text 或 数字. text
  html = html.replace(/^(\d+)\.\s+/gm, '<br>$1. ');
  html = html.replace(/^-\s+/gm, '<br>• ');
  // 双换行 → 段落分隔
  html = html.replace(/\n\n/g, '<br><br>');
  // 单换行 → <br>
  html = html.replace(/\n/g, '<br>');
  return html;
}

function _addCopyBtn(bubble, text) {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg><span>复制</span>';
  btn.onclick = async () => {
    try {
      await navigator.clipboard.writeText(text);
      btn.querySelector('span').textContent = '已复制';
      setTimeout(() => btn.querySelector('span').textContent = '复制', 1500);
    } catch { btn.querySelector('span').textContent = '复制失败'; }
  };
  bubble.appendChild(btn);
}

let chatHistory = [];

function _getChatKey() {
  return 'chat_' + (STATE.creatorName || STATE._corpusFilename || 'default');
}
function _saveChatHistory() {
  try { localStorage.setItem(_getChatKey(), JSON.stringify(chatHistory)); } catch {}
}
function _loadChatHistory() {
  try {
    const saved = localStorage.getItem(_getChatKey());
    if (!saved) return;
    chatHistory = JSON.parse(saved);
    const box = $('chatBox');
    // 保留问候语，追加历史消息
    for (let i = 0; i < chatHistory.length; i += 2) {
      const userMsg = chatHistory[i];
      const botMsg = chatHistory[i + 1];
      if (userMsg) {
        const u = document.createElement('div');
        u.className = 'chat-bubble user';
        u.textContent = userMsg.content;
        box.appendChild(u);
      }
      if (botMsg) {
        const b = document.createElement('div');
        b.className = 'chat-bubble bot';
        b.innerHTML = _formatMd(botMsg.content);
        _addCopyBtn(b, botMsg.content);
        box.appendChild(b);
      }
    }
    box.scrollTop = box.scrollHeight;
  } catch {}
}

async function copyAllChat() {
  const bubbles = $('chatBox').querySelectorAll('.chat-bubble');
  const lines = [];
  bubbles.forEach(b => {
    const role = b.classList.contains('user') ? '我' : '分身';
    lines.push(`【${role}】\n${b.innerText.replace(/\n复制$/,'').trim()}`);
  });
  const text = lines.join('\n\n');
  try {
    await navigator.clipboard.writeText(text);
    const btn = $('copyAllBtn');
    btn.textContent = '✅ 已复制';
    setTimeout(() => {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>复制全部对话';
    }, 2000);
  } catch(e) { alert('复制失败，请手动选取'); }
}

async function sendChat() {
  const input = $('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const box = $('chatBox');

  const user = document.createElement('div');
  user.className = 'chat-bubble user';
  user.textContent = msg;
  box.appendChild(user);

  const bot = document.createElement('div');
  bot.className = 'chat-bubble bot';
  bot.textContent = '思考中...';
  box.appendChild(bot);
  box.scrollTop = box.scrollHeight;

  try {
    const chatBody = {
      message: msg,
      creator_name: STATE.creatorName,
      history: chatHistory,
    };
    if (STATE._corpusMode && STATE._corpusText) {
      chatBody.corpus_text = STATE._corpusText;
      chatBody.corpus_instructions = STATE._corpusInstructions || '';
    } else {
      chatBody.videos_context = STATE.videos;
    }
    const res = await api('chat', chatBody);
    chatHistory.push({ role: 'user', content: msg });
    chatHistory.push({ role: 'assistant', content: res.response });
    bot.innerHTML = _formatMd(res.response);
    _addCopyBtn(bot, res.response);
    _saveChatHistory();
  } catch (e) {
    bot.textContent = '出错了：' + e.message;
    bot.style.color = 'var(--red)';
  }
  box.scrollTop = box.scrollHeight;
}
</script>
