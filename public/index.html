<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音博主文字稿提取</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --bg: #fbfbfd;
    --card-bg: #ffffff;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --green: #34c759;
    --orange: #ff9f0a;
    --red: #ff3b30;
    --border: rgba(0,0,0,0.06);
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 16px;
    --radius-sm: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Hero ─── */
  .hero {
    text-align: center;
    padding: 80px 24px 60px;
    background: linear-gradient(180deg, #f5f5f7 0%, var(--bg) 100%);
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, #6e6e73 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 19px;
    color: var(--text-secondary);
    margin-top: 12px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  /* ─── Layout ─── */
  .app-layout {
    display: flex;
    min-height: calc(100vh - 200px);
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: calc(100vh - 200px);
  }
  .sidebar-header {
    padding: 0 20px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .sidebar-empty {
    padding: 24px 20px;
    font-size: 13px;
    color: #c7c7cc;
    text-align: center;
    line-height: 1.6;
  }
  .avatar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .avatar-item:hover { background: #f5f5f7; }
  .avatar-item.active {
    background: rgba(0,113,227,0.06);
    border-left-color: var(--accent);
  }
  .avatar-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #5856d6);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .avatar-info {
    flex: 1;
    overflow: hidden;
  }
  .avatar-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .avatar-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .avatar-delete {
    opacity: 0;
    width: 20px;
    height: 20px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .avatar-item:hover .avatar-delete { opacity: 1; }
  .avatar-delete:hover { color: var(--red); background: rgba(255,59,48,0.1); }

  /* ─── Container ─── */
  .container {
    max-width: 680px;
    flex: 1;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ─── Card ─── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: box-shadow 0.3s ease;
  }
  .card:hover { box-shadow: var(--shadow-lg); }

  /* ─── Form ─── */
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s ease;
    background: #fafafa;
    color: var(--text);
  }
  input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
  }
  input::placeholder { color: #c7c7cc; }
  .row { display: flex; gap: 14px; }
  .row > * { flex: 1; }

  /* ─── Button ─── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px 32px;
    border: none;
    border-radius: 980px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); transform: scale(1.01); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled {
    background: #d2d2d7;
    cursor: not-allowed;
    transform: none;
  }
  .btn-success {
    background: var(--green);
    color: white;
  }
  .btn-success:hover { filter: brightness(1.05); transform: scale(1.01); }
  .btn-secondary {
    background: #f5f5f7;
    color: var(--text);
    border: 1.5px solid rgba(0,0,0,0.1);
  }
  .btn-secondary:hover { background: #ededf0; }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  .btn-row .btn { flex: 1; padding: 12px 16px; font-size: 15px; }

  /* ─── Progress ─── */
  .progress-wrap {
    background: rgba(0,0,0,0.04);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    margin: 16px 0;
  }
  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: var(--accent);
    transition: width 0.4s ease;
    width: 0%;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 980px;
    font-size: 14px;
    font-weight: 500;
  }
  .pill-info { background: rgba(0,113,227,0.08); color: var(--accent); }
  .pill-success { background: rgba(52,199,89,0.1); color: #248a3d; }
  .pill-error { background: rgba(255,59,48,0.1); color: var(--red); }
  .pill-warning { background: rgba(255,159,10,0.1); color: #c77c00; }
  .elapsed {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: right;
    margin-top: 4px;
  }

  /* ─── Title Scroll ─── */
  .title-scroll {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 16px;
    padding: 16px;
    background: #fafafa;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .title-scroll::-webkit-scrollbar { width: 4px; }
  .title-scroll::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }
  .title-item {
    padding: 6px 0;
    font-size: 14px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(0,0,0,0.03);
    line-height: 1.5;
  }
  .title-item:last-child { border-bottom: none; }
  .title-item.success { color: #248a3d; }
  .title-item.active { color: #c77c00; }
  .title-item.error { color: var(--red); }

  /* ─── Stats ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .stat-card {
    text-align: center;
    padding: 20px 12px;
    background: #f5f5f7;
    border-radius: var(--radius-sm);
  }
  .stat-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  /* ─── Video List ─── */
  .video-list {
    max-height: 320px;
    overflow-y: auto;
    margin: 16px 0;
  }
  .video-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    font-size: 14px;
  }
  .video-item:last-child { border-bottom: none; }
  .video-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 980px;
    margin-left: 12px;
    letter-spacing: 0.02em;
  }
  .badge-done { background: rgba(52,199,89,0.12); color: #248a3d; }
  .badge-fail { background: rgba(255,59,48,0.1); color: var(--red); }
  .badge-na { background: rgba(0,0,0,0.05); color: var(--text-secondary); }

  /* ─── Chat ─── */
  .chat-box {
    max-height: 400px;
    overflow-y: auto;
    padding: 16px;
    background: #f5f5f7;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .chat-bubble {
    margin-bottom: 12px;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    max-width: 80%;
    word-wrap: break-word;
  }
  .chat-bubble.user {
    background: var(--accent);
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 6px;
  }
  .chat-bubble.bot {
    background: white;
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }
  .chat-input-row {
    display: flex;
    gap: 10px;
  }
  .chat-input-row input { flex: 1; border-radius: 980px; }
  .chat-input-row button {
    width: auto;
    padding: 14px 28px;
    border-radius: 980px;
  }

  /* ─── Tabs ─── */
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-secondary);
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    font-weight: 600;
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Upload Corpus ─── */
  .upload-area {
    border: 2px dashed rgba(0,0,0,0.12);
    border-radius: var(--radius-sm);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
    margin-bottom: 16px;
  }
  .upload-area:hover { border-color: var(--accent); background: rgba(0,113,227,0.03); }
  .upload-area.has-file { border-color: var(--green); background: rgba(52,199,89,0.05); }
  .upload-area input[type="file"] { display: none; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: var(--text-secondary); }
  .upload-filename { font-size: 14px; color: var(--text); font-weight: 500; margin-top: 6px; }

  /* ─── History ─── */
  .history-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .history-toggle {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    text-transform: none;
  }
  .history-list { margin-top: 12px; }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    margin-bottom: 6px;
    background: #f5f5f7;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 14px;
  }
  .history-item:hover { background: #ededf0; }
  .history-item .h-main {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item .h-name { font-weight: 500; color: var(--text); }
  .history-item .h-kw {
    font-size: 12px;
    color: var(--accent);
    margin-left: 8px;
  }
  .history-item .h-time {
    font-size: 11px;
    color: var(--text-secondary);
    margin-left: 12px;
    white-space: nowrap;
  }

  /* ─── Resume Banner ─── */
  .resume-banner {
    background: rgba(0,113,227,0.06);
    border: 1.5px solid rgba(0,113,227,0.15);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .resume-banner strong { color: var(--accent); }

  .hidden { display: none !important; }

  @media (max-width: 800px) {
    .app-layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      height: auto;
      max-height: 200px;
      position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
  }
  @media (max-width: 600px) {
    .hero h1 { font-size: 32px; }
    .hero p { font-size: 16px; }
    .hero { padding: 48px 20px 36px; }
    .card { padding: 24px; }
    .row { flex-direction: column; gap: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .btn-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>文字稿提取</h1>
  <p>输入抖音博主链接，一键转录全部视频为 Word 文档</p>
</div>

<div class="app-layout">

<!-- 侧边栏：AI 分身列表 -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">AI 分身</div>
  <div id="avatarList">
    <div class="sidebar-empty">完成博主视频转录后<br>分身将出现在这里</div>
  </div>
</div>

<div class="container">

  <!-- 创建分身：Tab 切换 -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('douyin')">抖音博主提取</button>
      <button class="tab-btn" onclick="switchTab('upload')">上传文档</button>
    </div>

    <!-- Tab 1: 抖音博主 -->
    <div class="tab-panel active" id="tabDouyin">
      <div class="form-group">
        <label>抖音博主链接</label>
        <input type="text" id="douyinUrl" placeholder="粘贴分享链接 或 输入抖音号，如 wangboshiyuz">
      </div>
      <div class="form-group">
        <label>关键词筛选</label>
        <input type="text" id="keyword" placeholder="可选，空格分隔多个关键词">
      </div>
      <div class="resume-banner hidden" id="resumeBanner">
        <strong id="resumeInfo"></strong>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="resumeExtraction()">继续上次</button>
          <button class="btn btn-secondary" onclick="freshExtraction()">重新搜索</button>
        </div>
      </div>
      <button class="btn btn-primary" id="startBtn" onclick="startExtraction()">
        开始提取
      </button>
      <div class="history-section hidden" id="historySection">
        <div class="history-header" onclick="toggleHistory()">
          <span>最近搜索</span>
          <span class="history-toggle" id="historyToggle">展开</span>
        </div>
        <div class="history-list hidden" id="historyList"></div>
      </div>
    </div>

    <!-- Tab 2: 上传文档 -->
    <div class="tab-panel" id="tabUpload">
      <div class="form-group">
        <label>分身名称</label>
        <input type="text" id="corpusName" placeholder="给这个 AI 分身起个名字">
      </div>
      <div class="upload-area" id="uploadArea" onclick="if(event.target===this||!event.target.closest('input'))$('corpusFile').click()">
        <input type="file" id="corpusFile" accept=".docx,.txt,.md,.pdf" onchange="onFileSelected(this)" onclick="event.stopPropagation()">
        <div class="upload-icon">+</div>
        <div class="upload-text">点击上传文档（支持 .docx .txt .md .pdf）</div>
        <div class="upload-filename hidden" id="uploadFilename"></div>
      </div>
      <div class="form-group">
        <label>特殊要求（可选）</label>
        <input type="text" id="corpusInstructions" placeholder="例如：只用第三章的内容 / 用专业术语回答 / 模仿作者口吻">
      </div>
      <button class="btn btn-primary" id="uploadBtn" onclick="createCorpusAvatar()">
        创建分身
      </button>
    </div>
  </div>

  <!-- 进度 -->
  <div class="card hidden" id="progressCard">
    <div id="statusPill" class="status-pill pill-info">准备中...</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="elapsed" id="elapsedTime"></div>
    <div class="title-scroll hidden" id="titleScroll"></div>
  </div>

  <!-- 结果 -->
  <div class="card hidden" id="resultCard">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="video-list" id="videoList"></div>
    <button class="btn btn-success" id="downloadBtn" onclick="downloadDoc()">
      下载 Word 文档
    </button>
  </div>

  <!-- 对话 -->
  <div class="card hidden" id="chatCard">
    <div class="chat-box" id="chatBox">
      <div class="chat-bubble bot" id="chatGreeting">你好！我是这位博主的 AI 分身，有什么想聊的？</div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendChat()">
      <button class="btn btn-primary" onclick="sendChat()">发送</button>
    </div>
  </div>

</div>

</div><!-- /app-layout -->

<!-- Hidden fields for server-fallback config -->
<input type="hidden" id="cookie" value="">
<input type="hidden" id="openaiKey" value="">
<input type="hidden" id="apifyToken" value="">

<script>
let STATE = {
  videos: [],
  creatorName: '',
  secUid: '',
  startTime: null,
  timer: null,
};

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function switchTab(tab) {
  const tabs = { douyin: 'tabDouyin', upload: 'tabUpload' };
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === (tab === 'douyin' ? 0 : 1));
  });
  Object.entries(tabs).forEach(([key, id]) => {
    $(id).classList.toggle('active', key === tab);
  });
}

function setProgress(pct) {
  $('progressFill').style.width = pct + '%';
}

function setStatus(text, type) {
  const el = $('statusPill');
  el.className = 'status-pill pill-' + type;
  el.textContent = text;
}

function addTitle(text, cls) {
  const scroll = $('titleScroll');
  scroll.classList.remove('hidden');
  const div = document.createElement('div');
  div.className = 'title-item ' + (cls || '');
  div.textContent = text;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
  while (scroll.children.length > 60) scroll.removeChild(scroll.firstChild);
}

function startTimer() {
  STATE.startTime = Date.now();
  STATE.timer = setInterval(() => {
    const s = Math.floor((Date.now() - STATE.startTime) / 1000);
    $('elapsedTime').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  }, 1000);
}
function stopTimer() { if (STATE.timer) clearInterval(STATE.timer); }

async function api(endpoint, body) {
  const r = await fetch('/api/' + endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (r.headers.get('content-type')?.includes('application/json')) {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    return data;
  }
  if (!r.ok) throw new Error('Error ' + r.status);
  return r;
}

// ─── 缓存系统（视频列表 + 转录结果）───
const CACHE_PREFIX = 'dy-';

function _cacheKey(secUid, keyword) {
  // 缓存 key = sec_uid + 关键词，不同关键词搜索不会冲突
  const kw = (keyword || '').trim();
  return CACHE_PREFIX + 'videos-' + secUid + (kw ? '-kw-' + kw : '');
}

function saveVideoList(secUid, videos, creatorName, keyword) {
  try {
    const data = { videos, creatorName, keyword: (keyword || '').trim(), savedAt: Date.now() };
    localStorage.setItem(_cacheKey(secUid, keyword), JSON.stringify(data));
  } catch(e) {}
}

function loadVideoList(secUid, keyword) {
  try {
    const raw = localStorage.getItem(_cacheKey(secUid, keyword));
    if (!raw) return null;
    const data = JSON.parse(raw);
    // 缓存 7 天有效
    if (Date.now() - data.savedAt > 7 * 24 * 3600 * 1000) return null;
    return data;
  } catch(e) { return null; }
}

function saveTranscript(videoId, transcript) {
  try { localStorage.setItem(CACHE_PREFIX + 'tr-' + videoId, JSON.stringify(transcript)); } catch(e) {}
}

function loadTranscript(videoId) {
  try {
    const d = localStorage.getItem(CACHE_PREFIX + 'tr-' + videoId);
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

// 恢复视频列表中已缓存的转录结果
function restoreTranscripts(videos) {
  let count = 0;
  videos.forEach(v => {
    const saved = loadTranscript(v.id);
    if (saved) { v.transcript = saved; count++; }
  });
  return count;
}

// ─── SSE 获取视频列表（支持超时自动续传）───
async function fetchVideosSSE(secUid, keyword) {
  STATE.videos = [];
  STATE.creatorName = '';
  let resumeCursor = 0;
  let resumePage = 0;
  let totalScanned = 0;
  let round = 0;

  while (true) {
    round++;
    const prevMatched = STATE.videos.length;
    const result = await _fetchVideosOnce(secUid, keyword, resumeCursor, resumePage, totalScanned, prevMatched);

    // 续传时视频已通过 SSE 'videos' 事件实时 push 到 STATE.videos，无需重复添加

    totalScanned = result.total_scanned || totalScanned;
    STATE._totalScanned = totalScanned;
    STATE._stopReason = result.stop_reason || '';

    // 如果是超时且有续传游标，自动继续
    if (result.stop_reason === 'timeout' && result.resume_cursor) {
      resumeCursor = result.resume_cursor;
      resumePage = result.resume_page || 0;
      addTitle(`⏳ 第 ${round} 轮扫描超时，已扫描 ${totalScanned} 个，自动续传...`, 'info');
      continue;
    }

    // 正常结束
    break;
  }

  return { videos: STATE.videos, creator_name: STATE.creatorName };
}

function _fetchVideosOnce(secUid, keyword, startCursor, startPage, prevScanned, prevMatched) {
  return new Promise((resolve, reject) => {
    const body = JSON.stringify({
      sec_uid: secUid,
      keyword: keyword,
      max_videos: 0,
      start_cursor: startCursor,
      start_page: startPage,
      prev_scanned: prevScanned,
      prev_matched: prevMatched || 0,
    });

    fetch('/api/fetch-videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body,
    }).then(resp => {
      if (!resp.ok) {
        return resp.json().then(d => { throw new Error(d.error || 'Error'); });
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function processSSE(text) {
        buffer += text;
        const lines = buffer.split('\n');
        buffer = lines.pop();

        let eventType = '';
        let eventData = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            eventType = line.slice(7).trim();
          } else if (line.startsWith('data: ')) {
            eventData = line.slice(6);
          } else if (line === '' && eventType && eventData) {
            handleSSEvent(eventType, JSON.parse(eventData));
            eventType = '';
            eventData = '';
          }
        }
      }

      function handleSSEvent(type, data) {
        if (type === 'status') {
          setStatus(data.msg, 'info');
          if (data.total > 0 && data.fetched !== undefined) {
            setProgress(8 + Math.min((data.fetched / data.total) * 12, 12));
          }
        } else if (type === 'profile') {
          STATE.creatorName = data.creator_name || STATE.creatorName || '博主';
          if (!startCursor) {
            addTitle(`博主：${STATE.creatorName}（共 ${data.total_videos} 个视频）`, 'success');
          }
        } else if (type === 'videos') {
          data.videos.forEach(v => {
            STATE.videos.push(v);
            addTitle(`${STATE.videos.length}. ${v.title.substring(0, 50)}`);
          });
          setStatus(`已获取 ${data.fetched}/${data.total} 个匹配视频...`, 'info');
          if (data.total > 0) {
            setProgress(8 + Math.min((data.fetched / data.total) * 12, 12));
          }
        } else if (type === 'done') {
          // 首轮：done里有完整视频列表；续传轮：只有本轮新增的
          if (!startCursor) {
            STATE.videos = data.videos;
          }
          STATE.creatorName = data.creator_name || STATE.creatorName;
          resolve(data);
        } else if (type === 'error') {
          reject(new Error(data.error));
        }
      }

      function pump() {
        return reader.read().then(({ done, value }) => {
          if (done) {
            if (buffer) processSSE('\n');
            if (!STATE.videos.length && !startCursor) reject(new Error('未获取到视频'));
            else resolve({ videos: STATE.videos, creator_name: STATE.creatorName });
            return;
          }
          processSSE(decoder.decode(value, { stream: true }));
          return pump();
        });
      }

      return pump();
    }).catch(reject);
  });
}

// 用户点击「开始提取」
async function startExtraction() {
  const url = $('douyinUrl').value.trim();
  if (!url) return alert('请输入抖音链接');

  // 先解析 sec_uid
  $('startBtn').disabled = true;
  $('startBtn').textContent = '解析中...';

  try {
    const resolved = await api('resolve-url', { input: url });
    STATE.secUid = resolved.sec_uid;

    // 检查是否有缓存（含关键词匹配）
    const kw = $('keyword').value.trim();
    const cached = loadVideoList(STATE.secUid, kw);
    if (cached && cached.videos.length > 0) {
      const transcribed = restoreTranscripts(cached.videos);
      const remaining = cached.videos.filter(v => !v.transcript && (v.video_download_url || v.audio_url)).length;
      const kwInfo = cached.keyword ? `，关键词「${cached.keyword}」` : '';

      $('resumeInfo').textContent =
        `发现「${cached.creatorName}」的缓存${kwInfo}：${cached.videos.length} 个视频，` +
        `已转录 ${transcribed} 个，剩余 ${remaining} 个待转录`;
      show('resumeBanner');
      hide('startBtn');

      // 暂存缓存数据
      STATE._cachedData = cached;
      STATE._cachedUrl = url;
    } else {
      // 无缓存，直接开始
      await doFullExtraction(url);
    }
  } catch(e) {
    alert('解析失败：' + e.message);
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

// 用户选择「继续上次」
async function resumeExtraction() {
  hide('resumeBanner');
  show('startBtn');
  $('startBtn').disabled = true;
  $('startBtn').textContent = '处理中...';

  const cached = STATE._cachedData;
  STATE.videos = cached.videos;
  STATE.creatorName = cached.creatorName;
  STATE._corpusMode = false;
  STATE._corpusText = '';
  STATE._corpusInstructions = '';

  // 恢复转录缓存
  restoreTranscripts(STATE.videos);

  saveToHistory(STATE._cachedUrl, $('keyword').value.trim(), STATE.creatorName);

  show('progressCard');
  hide('resultCard');
  hide('chatCard');
  $('titleScroll').innerHTML = '';
  $('titleScroll').classList.add('hidden');
  startTimer();

  try {
    // 检查是否有未转录的视频需要刷新URL
    const todo = STATE.videos.filter(v => !v.transcript && (v.video_download_url || v.audio_url));
    if (todo.length > 0 && STATE.secUid) {
      addTitle(`${todo.length} 个视频待转录，正在刷新下载链接...`, 'active');
      setStatus('重新扫描获取最新下载链接...', 'info');
      // 重新扫描获取新URL（音频URL会过期）
      const kw = $('keyword').value.trim();
      const freshVideos = await _fetchFreshUrls(STATE.secUid, kw);
      if (freshVideos.length > 0) {
        // 用新URL更新未转录视频
        const urlMap = {};
        for (const fv of freshVideos) {
          urlMap[fv.id] = fv;
        }
        let refreshed = 0;
        for (const v of STATE.videos) {
          if (!v.transcript && urlMap[v.id]) {
            v.audio_url = urlMap[v.id].audio_url || v.audio_url;
            v.video_download_url = urlMap[v.id].video_download_url || v.video_download_url;
            refreshed++;
          }
        }
        addTitle(`已刷新 ${refreshed} 个视频的下载链接`, 'success');
        // 更新缓存
        saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, kw);
      }
    }
    await doTranscription();
  } catch (e) {
    setStatus(e.message, 'error');
    stopTimer();
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

// 重新扫描获取最新视频URL
async function _fetchFreshUrls(secUid, keyword) {
  return new Promise((resolve) => {
    const allVideos = [];
    const body = JSON.stringify({ sec_uid: secUid, keyword: keyword || '' });
    fetch('/api/fetch-videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    }).then(resp => {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let currentEvent = '';
      function pump() {
        reader.read().then(({ done, value }) => {
          if (done) { resolve(allVideos); return; }
          buf += decoder.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop();
          for (const block of parts) {
            const lines = block.split('\n');
            let evtType = '', evtData = '';
            for (const l of lines) {
              if (l.startsWith('event: ')) evtType = l.slice(7);
              if (l.startsWith('data: ')) evtData = l.slice(6);
            }
            if (!evtData) continue;
            try {
              const d = JSON.parse(evtData);
              if (evtType === 'videos' && d.videos) allVideos.push(...d.videos);
              if (evtType === 'status' && d.msg) setStatus(`刷新链接: ${d.msg}`, 'info');
            } catch {}
          }
          pump();
        }).catch(() => resolve(allVideos));
      }
      pump();
    }).catch(() => resolve(allVideos));
  });
}

// 用户选择「重新搜索」
async function freshExtraction() {
  hide('resumeBanner');
  show('startBtn');
  STATE._cachedData = null;
  // 清除旧的视频列表缓存，强制完全重新扫描
  if (STATE.secUid) {
    const kw = $('keyword').value.trim();
    try { localStorage.removeItem(_cacheKey(STATE.secUid, kw)); } catch(e) {}
  }
  await doFullExtraction(STATE._cachedUrl || $('douyinUrl').value.trim());
}

// 完整流程：获取视频 → 转录
async function doFullExtraction(url) {
  $('startBtn').disabled = true;
  $('startBtn').textContent = '处理中...';
  show('progressCard');
  hide('resultCard');
  hide('chatCard');
  $('titleScroll').innerHTML = '';
  $('titleScroll').classList.add('hidden');
  chatHistory = [];
  STATE._corpusMode = false;
  STATE._corpusText = '';
  STATE._corpusInstructions = '';
  startTimer();

  try {
    // 解析链接（如果还没解析过）
    if (!STATE.secUid) {
      setStatus('解析链接...', 'info');
      setProgress(3);
      const resolved = await api('resolve-url', { input: url });
      STATE.secUid = resolved.sec_uid;
    }
    addTitle('链接解析成功', 'success');

    // 流式获取视频列表
    setStatus('获取视频列表...', 'info');
    setProgress(8);
    await fetchVideosSSE(STATE.secUid, $('keyword').value.trim());

    setProgress(20);
    const scannedInfo = STATE._totalScanned ? `（共扫描 ${STATE._totalScanned} 个视频）` : '';
    const stopInfo = STATE._stopReason ? ` [${STATE._stopReason}]` : '';
    setStatus(`找到 ${STATE.videos.length} 个匹配视频${scannedInfo}${stopInfo}`, 'success');
    if (STATE._stopReason) addTitle(`扫描结束原因：${STATE._stopReason}`, 'info');
    saveToHistory(url, $('keyword').value.trim(), STATE.creatorName);

    // 缓存视频列表（含关键词）
    saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, $('keyword').value.trim());

    if (!STATE.videos.length) {
      setStatus('未找到匹配的视频', 'warning');
      stopTimer();
      $('startBtn').disabled = false;
      $('startBtn').textContent = '开始提取';
      return;
    }

    // 恢复已有的转录缓存
    restoreTranscripts(STATE.videos);

    // 转录
    await doTranscription();

  } catch (e) {
    setStatus(e.message, 'error');
    stopTimer();
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = '开始提取';
  }
}

// 转录阶段（独立函数，供断点续传复用）
async function doTranscription() {
  const queue = STATE.videos.filter(v => v.video_download_url || v.audio_url);
  if (!queue.length) {
    setStatus('没有可转录的视频', 'warning');
    showResults();
    stopTimer();
    return;
  }

  $('titleScroll').innerHTML = '';

  // 统计已缓存 vs 待转录
  const cached = queue.filter(v => v.transcript).length;
  const todo = queue.filter(v => !v.transcript);

  if (cached > 0) {
    addTitle(`从缓存恢复 ${cached} 个已转录视频`, 'success');
  }

  if (todo.length === 0) {
    addTitle('所有视频均已转录，无需重复操作', 'success');
    setProgress(100);
    setStatus(`全部完成 — ${cached} 个视频已转录`, 'success');
    stopTimer();
    showResults();
    // 更新视频列表缓存（含关键词）
    saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, $('keyword').value.trim());
    return;
  }

  addTitle(`需要转录 ${todo.length} 个视频...`, 'success');

  let ok = cached, fail = 0;
  const MAX_RETRIES = 3;
  for (let i = 0; i < todo.length; i++) {
    const v = todo[i];
    const pct = 20 + ((cached + i) / queue.length) * 70;
    setProgress(pct);
    const num = cached + i + 1;
    setStatus(`转录 ${num}/${queue.length}：${v.title.substring(0, 25)}...`, 'info');
    addTitle(`${num}. 转录中：${v.title.substring(0, 42)}`, 'active');

    let success = false;
    for (let retry = 0; retry < MAX_RETRIES; retry++) {
      try {
        const res = await api('transcribe', {
          audio_url: v.audio_url,
          video_download_url: v.video_download_url,
          video_url: v.url,
          video_id: v.id,
        });
        v.transcript = res.transcript;
        saveTranscript(v.id, res.transcript);
        ok++;
        addTitle(`${num}. 完成：${v.title.substring(0, 42)}`, 'success');
        success = true;
        break;
      } catch (e) {
        if (retry < MAX_RETRIES - 1) {
          addTitle(`${num}. 重试(${retry + 1}/${MAX_RETRIES})：${v.title.substring(0, 30)} - ${e.message}`, 'info');
          await new Promise(r => setTimeout(r, 2000 * (retry + 1)));
        } else {
          fail++;
          v.transcript = null;
          addTitle(`${num}. 失败：${v.title.substring(0, 35)} - ${e.message}`, 'error');
        }
      }
    }
  }

  // 更新视频列表缓存（含转录状态和关键词）
  saveVideoList(STATE.secUid, STATE.videos, STATE.creatorName, $('keyword').value.trim());

  setProgress(100);
  setStatus(`完成 — 成功 ${ok}，失败 ${fail}`, 'success');
  stopTimer();
  showResults();
}

function showResults() {
  show('resultCard');
  const total = STATE.videos.length;
  const done = STATE.videos.filter(v => v.transcript).length;
  const hasMedia = STATE.videos.filter(v => v.video_download_url || v.audio_url).length;

  $('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">视频</div></div>
    <div class="stat-card"><div class="stat-num">${hasMedia}</div><div class="stat-label">可转录</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">已转录</div></div>
  `;

  const list = $('videoList');
  list.innerHTML = '';
  STATE.videos.forEach(v => {
    const d = document.createElement('div');
    d.className = 'video-item';
    const canTranscribe = v.video_download_url || v.audio_url;
    const badge = v.transcript
      ? '<span class="badge badge-done">已转录</span>'
      : canTranscribe ? '<span class="badge badge-fail">失败</span>' : '<span class="badge badge-na">无媒体</span>';
    d.innerHTML = `<span class="video-title">${esc(v.title)}</span>${badge}`;
    list.appendChild(d);
  });

  if (done > 0) {
    $('downloadBtn').classList.remove('hidden');
    show('chatCard');
    // 更新聊天问候语
    $('chatGreeting').textContent = `你好！我是「${STATE.creatorName}」的 AI 分身，有什么想聊的？`;
    // 保存/更新 AI 分身
    if (STATE.secUid && STATE.creatorName) {
      saveAvatar(STATE.secUid, STATE.creatorName, $('keyword').value.trim(), total, done);
    }
  }
}

async function downloadDoc() {
  $('downloadBtn').disabled = true;
  $('downloadBtn').textContent = '生成中...';
  try {
    const r = await fetch('/api/generate-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videos: STATE.videos, creator_name: STATE.creatorName }),
    });
    if (!r.ok) throw new Error((await r.json()).error);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = STATE.creatorName + '_文字稿合集.docx';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    alert('文档生成失败：' + e.message);
  } finally {
    $('downloadBtn').disabled = false;
    $('downloadBtn').textContent = '下载 Word 文档';
  }
}

// ─── 搜索历史 ───
function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem('douyin-gpt-history') || '[]');
  } catch(e) { return []; }
}

function saveToHistory(url, keyword, creatorName) {
  const list = loadHistory();
  const idx = list.findIndex(h => h.url === url && h.keyword === keyword);
  if (idx >= 0) list.splice(idx, 1);
  list.unshift({
    url, keyword, creatorName,
    time: new Date().toLocaleDateString('zh-CN', {month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'}),
  });
  if (list.length > 20) list.length = 20;
  localStorage.setItem('douyin-gpt-history', JSON.stringify(list));
  renderHistory();
}

function renderHistory() {
  const list = loadHistory();
  if (!list.length) { hide('historySection'); return; }
  show('historySection');
  const el = $('historyList');
  el.innerHTML = '';
  list.forEach(h => {
    const d = document.createElement('div');
    d.className = 'history-item';
    const kwTag = h.keyword ? `<span class="h-kw">${esc(h.keyword)}</span>` : '';
    const name = h.creatorName || h.url.substring(0, 30);
    d.innerHTML = `<span class="h-main"><span class="h-name">${esc(name)}</span>${kwTag}</span><span class="h-time">${esc(h.time)}</span>`;
    d.onclick = () => {
      $('douyinUrl').value = h.url;
      $('keyword').value = h.keyword || '';
    };
    el.appendChild(d);
  });
}

function toggleHistory() {
  const list = $('historyList');
  const toggle = $('historyToggle');
  if (list.classList.contains('hidden')) {
    list.classList.remove('hidden');
    toggle.textContent = '收起';
  } else {
    list.classList.add('hidden');
    toggle.textContent = '展开';
  }
}

// ─── AI 分身侧边栏 ───
const AVATARS_KEY = 'dy-avatars';

function loadAvatars() {
  try { return JSON.parse(localStorage.getItem(AVATARS_KEY) || '[]'); } catch(e) { return []; }
}

function saveAvatars(list) {
  try { localStorage.setItem(AVATARS_KEY, JSON.stringify(list)); } catch(e) {}
}

function saveAvatar(secUid, creatorName, keyword, videoCount, transcribedCount) {
  const list = loadAvatars();
  const idx = list.findIndex(a => a.secUid === secUid && a.keyword === (keyword || ''));
  const entry = {
    secUid,
    creatorName,
    keyword: keyword || '',
    videoCount,
    transcribedCount,
    savedAt: Date.now(),
  };
  if (idx >= 0) {
    list[idx] = entry;
  } else {
    list.unshift(entry);
  }
  saveAvatars(list);
  renderAvatars();
}

function deleteAvatar(secUid, keyword) {
  const old = loadAvatars();
  const target = old.find(a => a.secUid === secUid && a.keyword === (keyword || ''));
  // 清理语料库数据
  if (target && target.type === 'corpus') {
    try { localStorage.removeItem('dy-corpus-' + secUid); } catch(e) {}
  }
  const list = old.filter(a => !(a.secUid === secUid && a.keyword === (keyword || '')));
  saveAvatars(list);
  renderAvatars();
}

function renderAvatars() {
  const list = loadAvatars();
  const el = $('avatarList');
  if (!list.length) {
    el.innerHTML = '<div class="sidebar-empty">完成博主视频转录后<br>分身将出现在这里</div>';
    return;
  }
  el.innerHTML = '';
  list.forEach(a => {
    const div = document.createElement('div');
    div.className = 'avatar-item';
    // 高亮当前活跃的分身
    const isActive = a.type === 'corpus'
      ? STATE.secUid === a.secUid
      : STATE.secUid === a.secUid && ($('keyword').value.trim() || '') === a.keyword;
    if (isActive) {
      div.classList.add('active');
    }
    const initial = (a.creatorName || '?')[0];
    let metaText = '';
    if (a.type === 'corpus') {
      metaText = `${((a.charCount || 0) / 1000).toFixed(0)}K 字 · ${a.filename || '文档'}`;
    } else {
      const kwTag = a.keyword ? ` · ${a.keyword}` : '';
      metaText = `${a.transcribedCount}/${a.videoCount} 已转录${kwTag}`;
    }
    const iconBg = a.type === 'corpus'
      ? 'background: linear-gradient(135deg, #34c759, #30d158);'
      : 'background: linear-gradient(135deg, var(--accent), #5856d6);';
    div.innerHTML = `
      <div class="avatar-icon" style="${iconBg}">${esc(initial)}</div>
      <div class="avatar-info">
        <div class="avatar-name">${esc(a.creatorName || '未知')}</div>
        <div class="avatar-meta">${esc(metaText)}</div>
      </div>
      <button class="avatar-delete" title="删除" onclick="event.stopPropagation();deleteAvatar('${a.secUid}','${a.keyword}')">×</button>
    `;
    div.onclick = () => switchAvatar(a);
    el.appendChild(div);
  });
}

function switchAvatar(avatar) {
  // 语料库类型分身
  if (avatar.type === 'corpus') {
    switchCorpusAvatar(avatar.secUid);
    return;
  }

  // 博主视频类型分身
  const cached = loadVideoList(avatar.secUid, avatar.keyword);
  if (!cached) {
    alert('该分身的数据已过期，请重新提取');
    deleteAvatar(avatar.secUid, avatar.keyword);
    return;
  }

  STATE._corpusMode = false;
  STATE._corpusText = '';
  STATE._corpusInstructions = '';
  STATE.secUid = avatar.secUid;
  STATE.videos = cached.videos;
  STATE.creatorName = cached.creatorName || avatar.creatorName;
  $('keyword').value = avatar.keyword || '';

  // 恢复转录
  restoreTranscripts(STATE.videos);

  // 重置聊天
  chatHistory = [];
  $('chatBox').innerHTML = `<div class="chat-bubble bot">你好！我是「${esc(STATE.creatorName)}」的 AI 分身，有什么想聊的？</div>`;

  // 显示结果和聊天
  showResults();
  show('chatCard');

  // 隐藏进度
  hide('progressCard');

  // 更新侧边栏高亮
  renderAvatars();
}

// 页面加载时渲染分身列表
renderAvatars();

// ─── 上传语料创建分身 ───
let _selectedFile = null;

function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  _selectedFile = file;
  $('uploadArea').classList.add('has-file');
  const fname = $('uploadFilename');
  fname.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + 'KB)';
  fname.classList.remove('hidden');
}

async function createCorpusAvatar() {
  const name = $('corpusName').value.trim();
  if (!name) { alert('请输入分身名称'); return; }
  if (!_selectedFile) { alert('请选择文档文件'); return; }

  const btn = $('uploadBtn');
  btn.disabled = true;
  btn.textContent = '解析中...';

  try {
    const formData = new FormData();
    formData.append('file', _selectedFile);
    formData.append('avatar_name', name);

    const resp = await fetch('/api/upload-corpus', {
      method: 'POST',
      body: formData,
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Upload failed');

    const instructions = $('corpusInstructions').value.trim();

    // 保存到 localStorage
    const corpusId = 'corpus-' + Date.now();
    const corpusData = {
      id: corpusId,
      type: 'corpus',
      avatarName: name,
      text: data.text,
      charCount: data.char_count,
      instructions: instructions,
      filename: _selectedFile.name,
      savedAt: Date.now(),
    };
    localStorage.setItem('dy-corpus-' + corpusId, JSON.stringify(corpusData));

    // 保存分身索引
    const avatars = loadAvatars();
    avatars.unshift({
      secUid: corpusId,
      creatorName: name,
      keyword: '',
      videoCount: 0,
      transcribedCount: 0,
      type: 'corpus',
      charCount: data.char_count,
      filename: _selectedFile.name,
      instructions: instructions,
      savedAt: Date.now(),
    });
    saveAvatars(avatars);
    renderAvatars();

    // 立即切换到该分身的聊天
    switchCorpusAvatar(corpusId);

    // 清空表单
    $('corpusName').value = '';
    $('corpusInstructions').value = '';
    $('corpusFile').value = '';
    _selectedFile = null;
    $('uploadArea').classList.remove('has-file');
    $('uploadFilename').classList.add('hidden');

    alert('分身「' + name + '」创建成功！');
  } catch (e) {
    alert('创建失败：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '创建分身';
  }
}

function switchCorpusAvatar(corpusId) {
  const raw = localStorage.getItem('dy-corpus-' + corpusId);
  if (!raw) {
    alert('语料数据已过期，请重新上传');
    return;
  }
  const corpus = JSON.parse(raw);

  // 设置状态
  STATE._corpusMode = true;
  STATE._corpusText = corpus.text;
  STATE._corpusInstructions = corpus.instructions || '';
  STATE.creatorName = corpus.avatarName;
  STATE.secUid = corpusId;
  STATE.videos = [];

  // 重置聊天
  chatHistory = [];
  $('chatBox').innerHTML = `<div class="chat-bubble bot">你好！我是「${esc(corpus.avatarName)}」，基于「${esc(corpus.filename)}」创建。有什么想问的？</div>`;

  // 显示聊天，隐藏其他
  show('chatCard');
  hide('progressCard');
  hide('resultCard');

  renderAvatars();
}

let chatHistory = [];
async function sendChat() {
  const input = $('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const box = $('chatBox');

  const user = document.createElement('div');
  user.className = 'chat-bubble user';
  user.textContent = msg;
  box.appendChild(user);

  const bot = document.createElement('div');
  bot.className = 'chat-bubble bot';
  bot.textContent = '思考中...';
  box.appendChild(bot);
  box.scrollTop = box.scrollHeight;

  try {
    const chatBody = {
      message: msg,
      creator_name: STATE.creatorName,
      history: chatHistory,
    };
    if (STATE._corpusMode && STATE._corpusText) {
      chatBody.corpus_text = STATE._corpusText;
      chatBody.corpus_instructions = STATE._corpusInstructions || '';
    } else {
      chatBody.videos_context = STATE.videos;
    }
    const res = await api('chat', chatBody);
    chatHistory.push({ role: 'user', content: msg });
    chatHistory.push({ role: 'assistant', content: res.response });
    bot.textContent = res.response;
  } catch (e) {
    bot.textContent = '出错了：' + e.message;
    bot.style.color = 'var(--red)';
  }
  box.scrollTop = box.scrollHeight;
}
</script>
